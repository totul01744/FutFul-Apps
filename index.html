<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FutFul - মাতৃত্ব ও শিশু যত্ন</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b9d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Splash Screen -->
<div id="splash" class="splash">
  <div class="splash-content">
    <div class="splash-logo">🌸</div>
    <h1 class="splash-title">FutFul</h1>
    <p class="splash-sub">মাতৃত্ব ও শিশু যত্ন</p>
    <div class="splash-loader"><div></div><div></div><div></div></div>
  </div>
</div>

<!-- Auth Screen -->
<div id="authScreen" class="screen hidden">
  <div class="auth-bg">
    <div class="auth-blob b1"></div>
    <div class="auth-blob b2"></div>
    <div class="auth-blob b3"></div>
  </div>
  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">🌸</span>
      <h1>FutFul</h1>
      <p>আপনার শিশুর সেরা যত্নসঙ্গী</p>
    </div>
    
    <!-- Login Form -->
    <div id="loginForm" class="auth-card">
      <h2>লগইন করুন</h2>
      <div class="form-group">
        <input type="email" id="loginEmail" placeholder="ইমেইল" class="glass-input">
      </div>
      <div class="form-group">
        <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড" class="glass-input">
      </div>
      <button onclick="loginWithEmail()" class="btn-primary">লগইন</button>
      <div class="divider"><span>অথবা</span></div>
      <button onclick="loginWithGoogle()" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google দিয়ে লগইন
      </button>
      <p class="auth-switch">নতুন ব্যবহারকারী? <a onclick="showRegister()">রেজিস্ট্রেশন করুন</a></p>
    </div>
    
    <!-- Register Form -->
    <div id="registerForm" class="auth-card hidden">
      <h2>রেজিস্ট্রেশন</h2>
      <div class="form-group">
        <input type="text" id="regName" placeholder="আপনার নাম" class="glass-input">
      </div>
      <div class="form-group">
        <input type="email" id="regEmail" placeholder="ইমেইল" class="glass-input">
      </div>
      <div class="form-group">
        <input type="tel" id="regPhone" placeholder="মোবাইল নম্বর" class="glass-input">
      </div>
      <div class="form-group">
        <input type="password" id="regPassword" placeholder="পাসওয়ার্ড" class="glass-input">
      </div>
      <button onclick="registerUser()" class="btn-primary">রেজিস্ট্রেশন করুন</button>
      <p class="auth-switch">ইতিমধ্যে অ্যাকাউন্ট আছে? <a onclick="showLogin()">লগইন করুন</a></p>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" class="screen hidden">
  
  <!-- Top Header -->
  <header class="app-header">
    <div class="header-left">
      <span class="header-logo">🌸</span>
      <span class="header-title">FutFul</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="showNotifications()">🔔<span id="notifBadge" class="badge hidden">0</span></button>
      <button class="icon-btn" onclick="showCart()">🛒<span id="cartBadge" class="badge hidden">0</span></button>
    </div>
  </header>

  <!-- Page Content -->
  <div id="pageContent" class="page-content">
    <!-- Dynamic content loads here -->
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showPage('home')" id="nav-home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">হোম</span>
    </button>
    <button class="nav-btn" onclick="showPage('community')" id="nav-community">
      <span class="nav-icon">👥</span>
      <span class="nav-label">কমিউনিটি</span>
    </button>
    <button class="nav-btn" onclick="showPage('products')" id="nav-products">
      <span class="nav-icon">🛍️</span>
      <span class="nav-label">পণ্য</span>
    </button>
    <button class="nav-btn" onclick="showPage('earn')" id="nav-earn">
      <span class="nav-icon">💰</span>
      <span class="nav-label">উপার্জন</span>
    </button>
    <button class="nav-btn" onclick="showPage('tools')" id="nav-tools">
      <span class="nav-icon">🛠️</span>
      <span class="nav-label">সরঞ্জাম</span>
    </button>
    <button class="nav-btn" onclick="showPage('profile')" id="nav-profile">
      <span class="nav-icon">👤</span>
      <span class="nav-label">প্রোফাইল</span>
    </button>
  </nav>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast hidden"></div>

<!-- Modal Overlay -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal()">
  <div id="modalContent" class="modal-content" onclick="event.stopPropagation()">
  </div>
</div>

<!-- Cart Panel -->
<div id="cartPanel" class="side-panel hidden">
  <div class="panel-header">
    <h3>🛒 শপিং কার্ট</h3>
    <button onclick="closeCart()" class="close-btn">✕</button>
  </div>
  <div id="cartItems" class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total">মোট: <strong id="cartTotal">৳০</strong></div>
    <button onclick="checkout()" class="btn-primary">চেকআউট করুন</button>
  </div>
</div>

<!-- Chatbot Panel -->
<div id="chatbotPanel" class="chatbot-panel hidden">
  <div class="chat-header">
    <span>🤖 FutFul Help Desk</span>
    <button onclick="toggleChatbot()" class="close-btn">✕</button>
  </div>
  <div id="chatMessages" class="chat-messages">
    <div class="chat-msg bot">
      <span>নমস্কার! আমি FutFul Help Desk। শিশু যত্ন সম্পর্কে যেকোনো প্রশ্ন করুন। 🌸</span>
    </div>
  </div>
  <div class="chat-input-area">
    <input type="text" id="chatInput" placeholder="আপনার প্রশ্ন লিখুন..." class="chat-input" onkeypress="if(event.key==='Enter') sendChat()">
    <button onclick="sendChat()" class="chat-send">➤</button>
  </div>
</div>

<!-- FAB Chatbot Button -->
<button id="chatFab" class="chat-fab hidden" onclick="toggleChatbot()">💬</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
